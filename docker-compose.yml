services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: reto_gcv
      POSTGRES_USER: reto
      POSTGRES_PASSWORD: reto_pass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reto"]
      interval: 5s
      retries: 5

volumes:
  pgdata:
